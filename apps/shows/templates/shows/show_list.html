{% extends "base.html" %}

{% block title %}Spettacoli{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Spettacoli</h1>
    {% if is_artist %}
        <form action="{% url 'shows:artist_shows_dashboard' %}" method="get">
            <button class="btn btn-outline btn-sm" type="submit">Area artista</button>
        </form>
    {% endif %}
</div>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for show in shows %}
        {% include "shows/_show_card.html" with show=show %}
    {% empty %}
        <p class="col-span-full text-center text-slate-500">Nessuno spettacolo disponibile.</p>
    {% endfor %}
</div>
{% endblock %}
