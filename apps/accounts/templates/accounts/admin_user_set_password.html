{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Cambia password — {{ target_user.username }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto card p-6 space-y-4">
    <div>
        <h1 class="section-title mb-1">Cambia password</h1>
        <p class="text-sm text-slate-600">{{ target_user.username }}</p>
    </div>
    <form method="post" class="text-sm">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="flex flex-wrap gap-2">
            <a class="btn btn-ghost btn-sm" href="{% url 'accounts:admin_user_list' %}">Torna alla lista</a>
            <button class="btn btn-primary btn-sm" type="submit">Salva password</button>
        </div>
    </form>
</div>
{% endblock %}
