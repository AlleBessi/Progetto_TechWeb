{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Profilo{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto card p-6">
    <h1 class="section-title mb-4">Profilo</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Salva</button>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
    {{ form.media }}
{% endblock %}
