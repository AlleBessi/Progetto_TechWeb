{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto card p-6">
    <h1 class="section-title mb-4">Login</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary btn-block" type="submit">Entra</button>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
    {{ form.media }}
{% endblock %}
