{% extends "base.html" %}

{% block title %}Nuovo spettacolo{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto card p-6">
    <h1 class="section-title mb-4">{% if show %}Modifica spettacolo{% else %}Nuovo spettacolo{% endif %}</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Salva</button>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
    {{ form.media }}
{% endblock %}
